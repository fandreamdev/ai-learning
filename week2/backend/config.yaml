# SmartQuery AI 配置文件
# 所有配置项都可以通过环境变量覆盖

app:
  name: "SmartQuery AI"
  host: "0.0.0.0"
  port: 8080
  env: "development"

database:
  # PostgreSQL 配置 (元数据存储)
  # 使用本地 PostgreSQL: postgres/postgres@localhost:5432
  url: "${DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/postgres}"
  max_connections: 20
  min_connections: 5
  connect_timeout: 10
  idle_timeout: 600

redis:
  # Redis 配置 (缓存/会话)
  # 本地 Redis 无密码，默认端口
  url: "redis://localhost:6379"
  max_connections: 10
  pool_timeout: 5

llm:
  # LLM 配置
  # 支持: openai / anthropic / local
  # 请在 .env 文件中填入您的 API Key
  provider: "openai"

  # OpenAI 配置
  # API Key 从环境变量 OPENAI_API_KEY 读取
  openai:
    api_key: "${OPENAI_API_KEY:-}"  # 请在 .env 中设置 OPENAI_API_KEY
    base_url: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
    model: "${OPENAI_MODEL:-gpt-4o-mini}"
    max_tokens: ${OPENAI_MAX_TOKENS:-4096}
    temperature: ${OPENAI_TEMPERATURE:-0.1}

  # Anthropic Claude 配置 (可选)
  anthropic:
    api_key: ""  # 请在 .env 中设置 ANTHROPIC_API_KEY
    base_url: "https://api.anthropic.com"
    model: "claude-3-5-sonnet-20241022"
    max_tokens: 4096
    temperature: 0.1

  # 本地模型配置 (可选, 如 Ollama)
  local:
    base_url: "http://localhost:11434/v1"
    model: "llama3"
    api_key: ""

jwt:
  secret: "${JWT_SECRET:-smartquery-dev-secret-key-2026-change-in-production}"
  access_token_expires: 3600       # 1小时
  refresh_token_expires: 604800    # 7天
  issuer: "smartquery"

security:
  # 密码哈希配置
  argon2:
    memory_cost: 19456   # 19 MB
    time_cost: 2
    parallelism: 1

  # CORS 配置
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
      - "http://127.0.0.1:5173"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Content-Type"
      - "Authorization"
      - "X-Request-ID"
    max_age: 3600

  # SQL 安全配置
  sql:
    max_query_length: 65536
    query_timeout: 30000    # 毫秒
    allow_dangerous_functions: false
    blocked_functions:
      - "LOAD_FILE"
      - "INTO OUTFILE"
      - "BENCHMARK"
      - "SLEEP"
      - "SHUTDOWN"
      - "pg_read_file"
      - "pg_read_binary_file"
      - "copy"

logging:
  level: "info"           # trace, debug, info, warn, error
  format: "pretty"       # json, pretty
  include_target: true
  include_span_list: true

# 向量数据库配置 (用于 Schema RAG)
vector:
  # pgvector 配置 (可选)
  # 启用 pgvector 扩展以获得更好的 Schema 检索体验
  enabled: true
  dimension: 1536  # OpenAI embedding dimension
