[alembic]
# Migration script location (relative to backend/)
script_location = alembic

# File naming template
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for new revision timestamps
timezone = UTC

# Slug length limit
truncate_slug_length = 40

# Allow Python path adjustments inside env.py
prepend_sys_path = .

# Version path separator
version_path_separator = os

# Database URL: left empty here on purpose.
# alembic/env.py overrides this at runtime from app.core.config.settings.
sqlalchemy.url =


[post_write_hooks]
# (intentionally empty for now)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
