server {
    listen 80;
    server_name _;

    # ----- gzip -----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ----- security headers -----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ----- static assets -----
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unmatched route serves index.html so client-side router takes over
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets (Vite emits content-hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ----- reverse proxy: /api -> backend service -----
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        # Keep upstream errors as-is so frontend gets unified envelope
        proxy_intercept_errors off;
    }

    # ----- health passthrough -----
    location = /healthz {
        proxy_pass http://backend:8000/healthz;
    }

    location = /readyz {
        proxy_pass http://backend:8000/readyz;
    }

    # ----- direct OpenAPI / docs proxy for convenience -----
    location /docs {
        proxy_pass http://backend:8000/docs;
    }
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }
}
